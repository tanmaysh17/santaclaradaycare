  * { box-sizing: border-box; margin: 0; padding: 0; }

  h1 { padding: 14px 16px 2px; font-size: 20px; color: #1a1a2e; }
  .subtitle { padding: 0 16px 8px; color: #666; font-size: 12px; line-height: 1.5; }
  /* Controls */
  .controls { display: flex; gap: 8px; padding: 8px 16px 12px; align-items: center; flex-wrap: wrap; }
  .controls input { padding: 8px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; flex: 1; min-width: 180px; }
  .controls select { padding: 7px 8px; border: 1px solid #ccc; border-radius: 8px; font-size: 12px; background: #fff; }
  .controls label { font-size: 12px; color: #555; display: flex; align-items: center; gap: 4px; }
  .count { font-size: 11px; color: #888; width: 100%; }
  /* Legend */
  .legend { display: flex; gap: 10px; padding: 4px 16px 10px; flex-wrap: wrap; font-size: 11px; color: #555; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
  /* Card grid */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; padding: 0 16px 48px; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.09); overflow: hidden; border-top: 4px solid #d1d5db; }
  .card.top    { border-top-color: #22c55e; }
  .card.good   { border-top-color: #86efac; }
  .card.ok     { border-top-color: #fbbf24; }
  .card.low    { border-top-color: #d1d5db; }
  .card.excluded { border-top-color: #ef4444; background: #fff5f5; }
  .card.verify { border-top-color: #f59e0b; background: #fffbf0; }
  .card.closed { border-top-color: #9ca3af; background: #f5f5f5; }
  /* Card sections */
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 14px 6px; gap: 10px; }
  .card-name { font-size: 14px; font-weight: 700; color: #1a1a2e; flex: 1; line-height: 1.35; }
  .card-badges { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 14px 8px; }
  .card-contact { display: flex; flex-direction: column; gap: 6px; padding: 8px 14px; border-top: 1px solid #f0f0f0; font-size: 12px; }
  .card-contact a { color: #1d4ed8; text-decoration: none; }
  .card-contact a:hover { text-decoration: underline; }
  .card-contact span { color: #555; }
  .card-hl { padding: 10px 14px; border-top: 1px solid #f0f0f0; }
  .card-pos { font-size: 11px; color: #15803d; line-height: 1.55; }
  .card-neg { font-size: 11px; color: #dc2626; line-height: 1.55; margin-top: 6px; }
  details.card-details { border-top: 1px solid #f0f0f0; }
  details.card-details > summary { font-size: 11px; font-weight: 600; color: #6b7280; padding: 8px 14px; cursor: pointer; list-style: none; user-select: none; }
  details.card-details > summary::-webkit-details-marker { display: none; }
  details.card-details > summary::before { content: '▶  '; font-size: 9px; }
  details[open].card-details > summary::before { content: '▼  '; }
  details.card-details > summary:hover { color: #374151; background: #f9fafb; }
  .card-details-body { padding: 6px 14px 12px; }
  .card-scores { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 0 6px; }
  .card-score-item { display: flex; align-items: center; gap: 3px; font-size: 10px; color: #6b7280; }
  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; white-space: nowrap; }
  .badge-contact1 { background: #dcfce7; color: #15803d; }
  .badge-contact2 { background: #dbeafe; color: #1d4ed8; }
  .badge-contact3 { background: #ede9fe; color: #7c3aed; }
  .badge-verify   { background: #fef9c3; color: #854d0e; }
  .badge-exclude  { background: #fee2e2; color: #991b1b; }
  .badge-monitor  { background: #f3f4f6; color: #374151; }
  .type-badge { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; background: #e0e7ff; color: #3730a3; font-weight: 500; }
  .type-home      { background: #fef3c7; color: #92400e; }
  .type-montessori{ background: #d1fae5; color: #065f46; }
  .type-bilingual { background: #fce7f3; color: #9d174d; }
  .type-center    { background: #dbeafe; color: #1e40af; }
  .type-coopscusd { background: #f3f4f6; color: #374151; }
  /* Scores */
  .score { display: inline-block; width: 22px; height: 18px; line-height: 18px; text-align: center; border-radius: 3px; font-weight: 700; font-size: 11px; }
  .s5 { background: #16a34a; color: #fff; }
  .s4 { background: #84cc16; color: #fff; }
  .s3 { background: #f59e0b; color: #fff; }
  .s2 { background: #f97316; color: #fff; }
  .s1 { background: #dc2626; color: #fff; }
  .s0 { background: #e5e7eb; color: #9ca3af; font-weight: 400; }
  .total-score { font-size: 20px; font-weight: 800; white-space: nowrap; }
  .total-high { color: #15803d; }
  .total-good { color: #65a30d; }
  .total-ok   { color: #d97706; }
  .total-low  { color: #dc2626; }
  .cat-a { background: #dcfce7; color: #15803d; padding: 1px 5px; border-radius: 4px; font-size: 10px; font-weight: 700; }
  .cat-b { background: #dbeafe; color: #1d4ed8; padding: 1px 5px; border-radius: 4px; font-size: 10px; font-weight: 700; }
  .cat-c { background: #fee2e2; color: #991b1b; padding: 1px 5px; border-radius: 4px; font-size: 10px; font-weight: 700; }
  .violation-flag { color: #dc2626; font-weight: 700; }
  .violation-ok   { color: #16a34a; font-weight: 600; }
  a { color: #3b82f6; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .hidden { display: none !important; }
  .na { color: #bbb; font-style: italic; font-size: 11px; }
  .src-links { display: flex; flex-wrap: wrap; gap: 4px; padding: 6px 0 2px; }
  .src-links a { display: inline-block; padding: 2px 7px; background: #f3f4f6; border-radius: 4px; border: 1px solid #e5e7eb; color: #374151 !important; white-space: nowrap; font-size: 10px; text-decoration: none !important; }
  .src-links a:hover { background: #dbeafe; color: #1e40af !important; border-color: #93c5fd; }
  @media (max-width: 500px) {
    .card-grid { grid-template-columns: 1fr; gap: 10px; padding: 0 10px 36px; }
    h1 { font-size: 17px; }
    .controls input { font-size: 16px; }

  "Seedlings Family Daycare 🚫 LICENSE INACTIVE": [["Winnie", "https://winnie.com/us/santa-clara-ca"], ["Care.com", "https://www.care.com/child-care/santa-clara-ca"]],
  "Bright Horizons Stevens Creek 🚫 Quality Collapse": [["Winnie", "https://winnie.com/us/santa-clara-ca"], ["Daycare.com", "https://www.daycare.com/california/santa-clara/"]],
  "Tulip Kids — Lawrence Station (Sunnyvale)": [["NAEYC", "https://www.naeyc.org/accreditation/find-accredited-program"]],
  "Kidsville Preschool & Daycare": [["Winnie", "https://winnie.com/us/santa-clara-ca"]]
};
function buildSources(d) {
  const cleanName = d.name.split(/[⚠️🚫]/)[0].trim();
  const nameEnc = encodeURIComponent(cleanName);
  const addrEnc = encodeURIComponent([cleanName, d.address||'', 'Santa Clara CA'].join(' '));
  const licTrim = (d.license||'').trim();
  const isLicNum = /^\d{7,}$/.test(licTrim);
  const items = [];
  if (isLicNum) {
    items.push(`<a href="https://www.ccld.dss.ca.gov/carefacilitysearch/Details/${licTrim}" target="_blank" title="CA DSS — official CCL facility record (license #${licTrim})">📋 CCLD #${licTrim}</a>`);
  } else {
    items.push(`<a href="https://www.ccld.dss.ca.gov/carefacilitysearch/" target="_blank" title="CA Community Care Licensing portal — search by name or address to find license record">📋 CCLD Search</a>`);
  }
  items.push(`<a href="https://www.yelp.com/search?find_desc=${nameEnc}&find_loc=Santa+Clara%2C+CA" target="_blank" title="Yelp search for this daycare">⭐ Yelp</a>`);
  items.push(`<a href="https://www.google.com/maps/search/?api=1&query=${addrEnc}" target="_blank" title="Google Maps — verify address and drive time">🗺️ Maps</a>`);
  (EXTRA_LINKS[d.name] || []).forEach(([label, url]) => items.push(`<a href="${url}" target="_blank" title="Additional source cited in research">${label}</a>`));
  return `<div class="src-links">${items.join('')}</div>`;
}
function scoreClass(v) {
  if (!v || v === 0) return 's0';
  if (v >= 5) return 's5';
  if (v >= 4) return 's4';
  if (v >= 3) return 's3';
  if (v >= 2) return 's2';
  return 's1';
}
function totalClass(t) {
  if (!t || t === 0) return 'total-low';
  if (t >= 4.2) return 'total-high';
  if (t >= 3.7) return 'total-good';
  if (t >= 3.0) return 'total-ok';
  return 'total-low';
}
function confClass(c) {
  if (!c) return 'conf-low';
  if (c.startsWith('High')) return 'conf-high';
  if (c.startsWith('Med')) return 'conf-med';
  return 'conf-low';
}
function actionBadge(a) {
  if (!a) return '';
  const al = a.toLowerCase();
  if (al.includes('exclude') || al.includes('🚫')) return `<span class="badge badge-exclude">${a}</span>`;
  if (al.includes('contact first')) return `<span class="badge badge-contact1">Contact First</span>`;
  if (al.includes('contact second')) return `<span class="badge badge-contact2">Contact Second</span>`;
  if (al.includes('contact third')) return `<span class="badge badge-contact3">Contact Third</span>`;
  if (al.includes('verify')) return `<span class="badge badge-verify">${a}</span>`;
  return `<span class="badge badge-monitor">${a}</span>`;
}
function typeBadge(t) {
  const tl = t.toLowerCase();
  if (tl.includes('montessori')) return `<span class="type-badge type-montessori">Montessori</span>`;
  if (tl.includes('bilingual')) return `<span class="type-badge type-bilingual">Bilingual</span>`;
  if (tl.includes('home')) return `<span class="type-badge type-home">Home</span>`;
  if (tl.includes('center')) return `<span class="type-badge type-center">Center</span>`;
  return `<span class="type-badge type-coopscusd">${t}</span>`;
}
function catBadge(c) {
  if (c === 'A') return `<span class="cat-a">A</span>`;
  if (c === 'B') return `<span class="cat-b">B</span>`;
  if (c === 'C') return `<span class="cat-c">C</span>`;
  return c || '—';
}
function violations(v, g, k) {
  if (!v || v === '—' || v === 'Verify') {
    const glow = (g||'').toLowerCase();
    if (glow.includes('🚫') || glow.includes('inactive')) return `<span class="violation-flag">${g}</span>`;
    return `<span class="na">${v || '—'}</span>`;
  }
  const n = parseInt(v);
  if (!isNaN(n)) {
    if (n === 0) return `<span class="violation-ok">0 ✓</span>`;
    if (n >= 10) return `<span class="violation-flag">${v}</span>`;
    if (n >= 6) return `<span style="color:#f59e0b;font-weight:600">${v}</span>`;
    return `<span>${v}</span>`;
  }
  return v;
}
function wfhColor(w) {
  if (!w) return w;
  if (w === 'Excellent') return `<span style="color:#15803d;font-weight:600">Excellent</span>`;
  if (w === 'Easy') return `<span style="color:#65a30d">Easy</span>`;
  if (w === 'Comfortable') return `<span style="color:#d97706">Comfortable</span>`;
  if (w === 'Borderline') return `<span style="color:#dc2626">Borderline</span>`;
  if (w === 'Poor') return `<span style="color:#991b1b;font-weight:600">Poor</span>`;
  if (w.includes('Comfortable')) return `<span style="color:#d97706">${w}</span>`;
  if (w.includes('Borderline')) return `<span style="color:#dc2626">${w}</span>`;
  return w;
}

function buildCard(d) {
  const cleanName = d.name.split(/[⚠️🚫]/)[0].trim();
  const nameEnc = encodeURIComponent(cleanName);
  const addrEnc = encodeURIComponent([cleanName, d.address||'', 'Santa Clara CA'].join(' '));
  // Phone — tap-to-call on mobile
  const rawPhone = (d.phone||'').replace(/\D/g,'');
  const phoneHtml = rawPhone.length >= 10
    ? `<a href="tel:${rawPhone}">📞 ${d.phone}</a>`
    : (d.phone && d.phone !== '—' ? `<span>📞 ${d.phone}</span>` : '');
  // Address linked to Maps
  const addrHtml = d.address && d.address !== '—' && !/verify/i.test(d.address)
    ? `<a href="https://www.google.com/maps/search/?api=1&query=${addrEnc}" target="_blank">📍 ${d.address}, ${d.zip||''} · ${d.drive||''}</a>`
    : '';
  const websiteHtml = d.websiteUrl ? `<a href="${d.websiteUrl}" target="_blank">🌐 ${d.website}</a>` : '';
  const hoursHtml = d.hours && d.hours !== 'Verify' && d.hours !== '—' ? `<span>🕐 ${d.hours}${d.ages && d.ages !== '—' ? ' · Ages: '+d.ages : ''}</span>` : '';
  const totalDisplay = d.total > 0
    ? `<span class="total-score ${totalClass(d.total)}">${d.total.toFixed(2)}</span>`
    : `<span class="na" style="font-size:14px">N/A</span>`;
  // CCL safety block
  const licTrim = (d.license||'').trim();
  const isLicNum = /^\d{7,}$/.test(licTrim);
  const ccldHtml = isLicNum
    ? `<a href="https://www.ccld.dss.ca.gov/carefacilitysearch/Details/${licTrim}" target="_blank">📋 CCLD #${licTrim}</a>`
    : `<a href="https://www.ccld.dss.ca.gov/carefacilitysearch/" target="_blank">📋 CCLD Search</a>`;
  const vNum = parseInt(d.violations||'');
  const violHtml = !isNaN(vNum)
    ? (vNum === 0 ? `<span class="violation-ok">0 violations ✓</span>` : `<span class="${vNum>=10?'violation-flag':''}">${vNum} violations</span>`)
    : (d.violations && d.violations !== '—' ? `<span>${d.violations}</span>` : `<span class="na">Verify</span>`);
  const keyViolHtml = d.keyViol && !['None found','None','—','None — clean record'].includes(d.keyViol)
    ? `<div style="color:#dc2626;font-size:11px;margin-top:4px">${d.keyViol}</div>` : '';
  // Extra sources
  const extras = (EXTRA_LINKS[d.name]||[]).map(([l,u])=>`<a href="${u}" target="_blank">${l}</a>`).join('');
  const langMeals = [d.langs!=='—'?'🗣 '+d.langs:'', d.meals&&d.meals!=='—'&&d.meals!=='Verify'?'🍽 '+d.meals:''].filter(Boolean).join(' · ');
  return `<div class="card ${d.rowClass||''}" data-type="${d.typeTag||''}" data-action="${(d.action||'').toLowerCase()}" data-cat="${d.cat||''}">
  <div class="card-header">
    <div class="card-name">${d.name}</div>
    <div>${totalDisplay}</div>
  </div>
  <div class="card-badges">
    ${actionBadge(d.action)}
    ${typeBadge(d.type)}
    ${d.cat ? catBadge(d.cat) : ''}
  </div>
  <div class="card-contact">
    ${phoneHtml}${addrHtml}${websiteHtml}${hoursHtml}
  </div>
  <div class="card-hl">
    ${langMeals ? `<div style="font-size:11px;color:#555;margin-bottom:6px">${langMeals}</div>` : ''}
    <div class="card-pos">${d.pos||''}</div>
    ${d.neg ? `<div class="card-neg">${d.neg}</div>` : ''}
  </div>
  <details class="card-details">
    <summary>Safety · Scores · Sources</summary>
    <div class="card-details-body">
      <div style="font-size:11px">${ccldHtml} &nbsp;·&nbsp; ${violHtml} &nbsp;·&nbsp; Grade: ${d.grade||'Verify'}</div>
      ${keyViolHtml}
      <div class="card-scores">
        <span class="card-score-item"><span class="score ${scoreClass(d.s)}">${d.s}</span> Safety</span>
        <span class="card-score-item"><span class="score ${scoreClass(d.r)}">${d.r}</span> Rep</span>
        <span class="card-score-item"><span class="score ${scoreClass(d.c)}">${d.c}</span> Care</span>
        <span class="card-score-item"><span class="score ${scoreClass(d.cv)}">${d.cv}</span> Conv</span>
        <span class="card-score-item"><span class="score ${scoreClass(d.t)}">${d.t}</span> Toddler</span>
        <span class="card-score-item"><span class="score ${scoreClass(d.co)}">${d.co}</span> Comm</span>
        <span class="card-score-item"><span class="score ${scoreClass(d.l)}">${d.l}</span> Lang</span>
        <span class="card-score-item"><span class="score ${scoreClass(d.cost)}">${d.cost}</span> Cost</span>
        <span class="card-score-item"><span class="score ${scoreClass(d.av)}">${d.av}</span> Avail</span>
      </div>
      <div class="src-links">
        <a href="https://www.yelp.com/search?find_desc=${nameEnc}&find_loc=Santa+Clara%2C+CA" target="_blank">⭐ Yelp</a>
        ${extras}
      </div>
    </div>
  </details>
</div>`;
}
function renderTable() {
  const sortBy = document.getElementById('sortBy').value;
  const catOrder = {A:0,B:1,C:2};
  const sorted = [...daycares].sort((a,b) => {
    if (sortBy === 'name') return a.name.localeCompare(b.name);
    if (sortBy === 'dist') {
      const ca = catOrder[a.cat]??3, cb = catOrder[b.cat]??3;
      if (ca !== cb) return ca - cb;
    }
    return (b.total||0) - (a.total||0);
  });
  document.getElementById('cardGrid').innerHTML = sorted.map(buildCard).join('');
  filterTable();
}
function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const fType = document.getElementById('filterType').value;
  const fCat = document.getElementById('filterCat').value;
  const fAction = document.getElementById('filterAction').value;
  const hideEx = document.getElementById('hideExcluded').checked;
  const cards = document.querySelectorAll('#cardGrid .card');
  let visible = 0;
  cards.forEach(card => {
    const text = card.innerText.toLowerCase();
    const matchQ = !q || text.includes(q);
    const matchType = !fType || (card.dataset.type||'').includes(fType);
    const matchCat = !fCat || card.dataset.cat === fCat;
    const matchAct = !fAction || (card.dataset.action||'').includes(fAction);
    const matchHide = !hideEx || !card.classList.contains('excluded');
    if (matchQ && matchType && matchCat && matchAct && matchHide) { card.classList.remove('hidden'); visible++; }
    else card.classList.add('hidden');
  });
  document.getElementById('rowCount').textContent = `Showing ${visible} of ${cards.length} daycares`;
}
renderTable();
</script>
